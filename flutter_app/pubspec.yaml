name: vivasayi_ai_super_app
description: Vivasayi AI Super App mobile scaffold
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.5
  go_router: 14.6.2
  dio: ^5.10.0
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.9.0
  provider: ^6.0.0
  shared_preferences: ^2.0.0
  connectivity_plus: ^6.0.0
  flutter_svg: ^2.0.0
  local_auth: ^2.3.0
  camera: ^0.11.0
  image_picker: ^1.1.2
  fl_chart: ^0.69.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  url_launcher: ^6.3.0
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.6.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lang/
    - assets/models/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.jpg"
  min_sdk_android: 21
