services:
  php-api:
    build:
      context: ..
      dockerfile: infra/php-api.Dockerfile
    container_name: vivasayi_php_api
    ports:
      - "8000:80"
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: vivasayi_super_app
      DB_USERNAME: vivasayi
      DB_PASSWORD: secret
      JWT_SECRET: change_me_securely
    command: >
      sh -c "sed -ri 's!/var/www/html!/var/www/html/public!g' /etc/apache2/sites-available/*.conf /etc/apache2/apache2.conf /etc/apache2/conf-available/*.conf && sed -ri 's!AllowOverride None!AllowOverride All!g' /etc/apache2/apache2.conf && apache2-foreground"
    volumes:
      - ../php_api:/var/www/html
      - php_vendor:/var/www/html/vendor
    depends_on:
      - db
  db:
    image: mysql:8.0
    container_name: vivasayi_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vivasayi_super_app
      MYSQL_USER: vivasayi
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../database:/docker-entrypoint-initdb.d:ro
volumes:
  db_data:
  php_vendor:
